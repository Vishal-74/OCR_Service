[build]
# Use the Dockerfile if present (bulletproof against Railpack / Nixpacks
# detector regressions). Falls back to Nixpacks when Dockerfile is missing.
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# No startCommand here — the Dockerfile's CMD handles start-up via `sh -c`
# so $PORT gets properly expanded. Setting startCommand here bypasses the
# shell and Railway passes "$PORT" to gunicorn as a literal string.
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
