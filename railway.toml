[build]
# Use the Dockerfile if present (bulletproof against Railpack / Nixpacks
# detector regressions). Falls back to Nixpacks when Dockerfile is missing.
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Bind to 8080 literally — do NOT use $PORT here. Railway invokes this
# without a shell, so $PORT is passed through to gunicorn as the string "$PORT"
# and crashes. The Dockerfile CMD also uses 8080; Railway detects the port.
startCommand = "gunicorn app:app --bind 0.0.0.0:8080 --workers 2 --threads 4 --timeout 60"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
